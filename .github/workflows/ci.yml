name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install -e ".[dev]"
      - run: ruff check src tests
      - run: ruff format --check src tests
      - run: pytest --cov=finagent --cov-report=term-missing

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci || npm install
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t finagent:ci .

  codeql:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: python, javascript
      - uses: github/codeql-action/analyze@v3

  audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pip-audit
      - run: pip install -e .
      - run: pip-audit

  e2e:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Backend deps
        working-directory: backend
        run: pip install -e ".[dev]"
      - name: Frontend build
        working-directory: frontend
        run: |
          npm ci || npm install
          npm run build
      - name: Install Playwright
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Start server + smoke
        env:
          FINAGENT_ALLOW_INSECURE_SECRETS: "1"
          FINAGENT_DATA_DIR: ${{ github.workspace }}/data-ci
          PYTHONPATH: ${{ github.workspace }}/backend/src
        run: |
          mkdir -p data-ci
          python -m uvicorn finagent.main:app --host 127.0.0.1 --port 8000 --app-dir backend/src &
          for i in $(seq 1 60); do
            curl -sf http://127.0.0.1:8000/api/health && break
            sleep 1
          done
          cd frontend && npx playwright test e2e/a-z-desktop.spec.ts --project=chromium
