name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci || npm install
          npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}

      - name: Capacitor Android stub APK artifact
        working-directory: frontend
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android --save
          npx cap init FinAgent com.finagent.app --web-dir dist || true
          mkdir -p ../dist-mobile
          echo "APK built in full Android CI; see docs/guides/apk.md" > ../dist-mobile/README.txt
          # Placeholder marker so releases always include mobile docs
          cp -r dist ../dist-mobile/web || true

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist-mobile/README.txt
