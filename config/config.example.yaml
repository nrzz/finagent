# Optional power-user / GitOps config. Prefer the Setup Wizard + Settings UI.
# Safe to commit this example; never put secrets here.

llm:
  provider: ollama
  model: llama3.2:3b
  base_url: http://localhost:11434
  tool_mode: auto
  timeout_s: 120
  max_context_tokens: 8192
  temperature: 0.2

markets:
  stocks_global: true
  india: true
  crypto:
    enabled: true
    exchanges:
      - binance

trading:
  mode: paper
  kill_switch: false
  risk:
    max_position_pct: 10
    max_daily_loss_pct: 3
    max_order_value: 100000

appearance:
  theme: dark
  base_currency: INR
  locale: en-IN
  number_format: indian
  timezone: Asia/Kolkata